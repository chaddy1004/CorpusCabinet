services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - WORKSPACE_DIR=/workspace
    volumes:
      # Mount your workspace directory - contains database + PDFs
      # Configure HOST_WORKSPACE_DIR in .env (defaults to ./workspace)
      - ${HOST_WORKSPACE_DIR:-./workspace}:/workspace
